<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="limeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4ff70" />
      <stop offset="100%" stop-color="#c5ff41" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#c5ff41" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Badge -->
  <rect width="512" height="512" rx="128" fill="#0d0d0d" />
  
  <!-- Outer glowing accent ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#1f1f1f" stroke-width="12" />

  <!-- Monogram 'S' -->
  <path 
    d="M170 150h172c20 0 38 18 38 38v34c0 20-18 38-38 38H210c-20 0-38 18-38 38v34c0 20 18 38 38 38h172" 
    fill="none" 
    stroke="url(#limeGradient)" 
    stroke-width="56" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  
  <!-- Decorative small orange accent flame dot -->
  <circle cx="342" cy="372" r="24" fill="#f46c38" />
</svg>